name: Daily News Agent

on:
  schedule:
    # GitHub Actions 使用 UTC 时间。北京时间(UTC+8) 需要减去8小时
    # 00:00 UTC = 08:00 北京时间 (早晨)
    # 04:00 UTC = 12:00 北京时间 (中午)
    # 09:00 UTC = 17:00 北京时间 (下午)
    - cron: '0 0,4,9 * * *'
  workflow_dispatch: # 允许手动点击按钮触发测试

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run News Agent
        env:
          # 这些变量需要在 GitHub 仓库的 Settings -> Secrets 中配置
          EMAIL_HOST: smtp.qq.com  # 或者是 smtp.163.com, smtp.gmail.com
          EMAIL_PORT: 465
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python src/main.py
